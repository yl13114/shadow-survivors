name: Build Godot Game

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Godot
      uses: abeltrincat/godot-runner@v1
      with:
        godot-version: "4.4"
        export-template: true
        
    - name: Add iOS Export Preset
      run: |
        cat >> export_presets.cfg << 'EOF'
[preset.5]
name="iOS"
platform="iOS"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/ios/shadow-survivors"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
[preset.5.options]
custom_template/debug=""
custom_template/release=""
application/name="Shadow Survivors"
application/bundle_identifier="com.shadow.survivors"
application/short_version="1.0"
application/version="1"
application/icon="res://icon.png"
application/code_sign=false
EOF
        
    - name: Export iOS
      run: |
        mkdir -p build/ios
        godot --headless --export-release "iOS" "build/ios/shadow-survivors"
        ls -la build/ios/
        
    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: build/ios/
        retention-days: 7
