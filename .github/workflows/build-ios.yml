name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Download Godot
      run: |
        curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_macos.universal.zip"
        unzip -o godot.zip
        mv Godot.app /Applications/Godot.app
        chmod +x /Applications/Godot.app/Contents/MacOS/Godot
        /Applications/Godot.app/Contents/MacOS/Godot --version
        
    - name: Download Export Templates
      run: |
        TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/4.4.stable"
        mkdir -p "$TEMPLATES_DIR"
        curl -L -o templates.tpz "https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz"
        unzip -q -o templates.tpz -d /tmp/templates
        mv /tmp/templates/templates/* "$TEMPLATES_DIR/"
        ls "$TEMPLATES_DIR/"
        
    - name: Add iOS Export Preset
      run: |
        echo "" >> export_presets.cfg
        echo "[preset.5]" >> export_presets.cfg
        echo "name=\"iOS\"" >> export_presets.cfg
        echo "platform=\"iOS\"" >> export_presets.cfg
        echo "runnable=true" >> export_presets.cfg
        echo "dedicated_server=false" >> export_presets.cfg
        echo "custom_features=\"\"" >> export_presets.cfg
        echo "export_filter=\"all_resources\"" >> export_presets.cfg
        echo "include_filter=\"\"" >> export_presets.cfg
        echo "exclude_filter=\"\"" >> export_presets.cfg
        echo "export_path=\"build/ios/shadow-survivors\"" >> export_presets.cfg
        echo "encryption_include_filters=\"\"" >> export_presets.cfg
        echo "encryption_exclude_filters=\"\"" >> export_presets.cfg
        echo "encrypt_pck=false" >> export_presets.cfg
        echo "encrypt_directory=false" >> export_presets.cfg
        echo "" >> export_presets.cfg
        echo "[preset.5.options]" >> export_presets.cfg
        echo "custom_template/debug=\"\"" >> export_presets.cfg
        echo "custom_template/release=\"\"" >> export_presets.cfg
        echo "application/name=\"Shadow Survivors\"" >> export_presets.cfg
        echo "application/bundle_identifier=\"com.shadow.survivors\"" >> export_presets.cfg
        echo "application/short_version=\"1.0\"" >> export_presets.cfg
        echo "application/version=\"1\"" >> export_presets.cfg
        echo "application/icon=\"res://icon.png\"" >> export_presets.cfg
        echo "application/code_sign=false" >> export_presets.cfg
        
    - name: Export to Xcode Project
      run: |
        mkdir -p build/ios
        /Applications/Godot.app/Contents/MacOS/Godot --headless --export-release "iOS" "build/ios/shadow-survivors"
        echo "Export completed"
        ls -la build/ios/
        
    - name: Upload Xcode Project
      uses: actions/upload-artifact@v4
      with:
        name: ios-xcode-project
        path: build/ios/
        retention-days: 7
